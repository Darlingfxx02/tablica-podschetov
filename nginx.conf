server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — every client-side route should land on index.html
  # so react-router can take over.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed static assets (Vite emits content-hashed filenames)
  location ~* \.(?:js|css|woff2?|ttf|svg|png|jpe?g|gif|ico|webp|map)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # No cache for the entry HTML so deploys roll out immediately
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Healthcheck endpoint for Coolify
  location = /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
