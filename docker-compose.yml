# Deploy on the Windows + WSL host that already runs Coolify's Traefik:
#   web ─→ kp.darlingdesign.pro
#   api ─→ api.kp.darlingdesign.pro
#
# Traefik labels here mirror the pattern Coolify itself emits, so the
# containers slot straight into the existing coolify-proxy without any
# Coolify-UI configuration. The "coolify" external network is the bridge
# shared by Coolify's proxy and its managed apps; joining it is what makes
# Traefik discover us.
#
# Local docker compose up also works for end-to-end verification (the
# Traefik labels are harmless without a Traefik in front).

services:
  api:
    build:
      context: ./mcp-server
    networks:
      - coolify
    expose:
      - "24880"
    volumes:
      - estimate-data:/data
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:24880/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      # http → 301 → https
      - traefik.http.routers.kp-api-http.entryPoints=http
      - traefik.http.routers.kp-api-http.rule=Host(`api.kp.darlingdesign.pro`)
      - traefik.http.routers.kp-api-http.middlewares=redirect-to-https
      # https
      - traefik.http.routers.kp-api.entryPoints=https
      - traefik.http.routers.kp-api.rule=Host(`api.kp.darlingdesign.pro`)
      - traefik.http.routers.kp-api.tls=true
      - traefik.http.routers.kp-api.tls.certresolver=letsencrypt
      - traefik.http.routers.kp-api.service=kp-api
      - traefik.http.services.kp-api.loadbalancer.server.port=24880

  web:
    build:
      context: .
      args:
        VITE_MCP_SERVER_URL: https://api.kp.darlingdesign.pro
    networks:
      - coolify
    expose:
      - "80"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.middlewares.gzip.compress=true
      # http → 301 → https
      - traefik.http.routers.kp-web-http.entryPoints=http
      - traefik.http.routers.kp-web-http.rule=Host(`kp.darlingdesign.pro`)
      - traefik.http.routers.kp-web-http.middlewares=redirect-to-https
      # https
      - traefik.http.routers.kp-web.entryPoints=https
      - traefik.http.routers.kp-web.rule=Host(`kp.darlingdesign.pro`)
      - traefik.http.routers.kp-web.tls=true
      - traefik.http.routers.kp-web.tls.certresolver=letsencrypt
      - traefik.http.routers.kp-web.middlewares=gzip
      - traefik.http.routers.kp-web.service=kp-web
      - traefik.http.services.kp-web.loadbalancer.server.port=80

volumes:
  estimate-data:

networks:
  coolify:
    external: true
